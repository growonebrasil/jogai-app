workflows:
  jogai_android:
    name: JOGA.I Android Build
    environment:
      node: 22
      java: 21
    scripts:
      - npm install
      - npm run build
      - npx cap sync android
      - chmod +x android/gradlew
      - cd android && ./gradlew assembleRelease
    artifacts:
      - android/app/build/outputs/**/*.apk
      - android/app/build/outputs/**/*.aab

  jogai_ios:
    name: JOGA.I iOS Build
    environment:
      node: 22
      xcode: latest
      vars:
        XCODE_WORKSPACE: "ios/App.xcodeproj/project.xcworkspace"
        XCODE_SCHEME: "App"
        BUNDLE_ID: "br.com.growone.jogai"
    scripts:
      - npm install
      - npm run build
      - npx cap sync ios
      - xcode-project use-profiles
      - xcode-project build-ipa --workspace "$XCODE_WORKSPACE" --scheme "$XCODE_SCHEME"
    artifacts:
      - build/ios/ipa/*.ipa