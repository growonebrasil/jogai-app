workflows:
jogai_android:
  name: JOGA.I Android Build

  environment:
    node: 22

  scripts:
    - npm install
    - npm run build
    - npx cap sync android
    - chmod +x android/gradlew
    - cd android && ./gradlew assembleRelease

  artifacts:
    - android/app/build/outputs/**/*.apk
    - android/app/build/outputs/**/*.aab
    
  jogai_ios:
    name: JOGA.I iOS Build
    environment:
      node: 22
      xcode: latest
    scripts:
      - npm install
      - npm run build
      - npx cap sync ios
    artifacts:
      - build/ios/ipa/*.ipa