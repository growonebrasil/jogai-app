workflows:
  jogai_android:
    name: JOGA.I Android Build
    environment:
      node: 22
    scripts:
      - npm install
      - npm run build
      - npx cap sync android
      - chmod +x android/gradlew
      - cd android && ./gradlew assembleRelease
    artifacts:
      - android/app/build/outputs/**/*.apk
      - android/app/build/outputs/**/*.aab